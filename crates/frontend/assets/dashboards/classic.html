<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Indicators (alt design)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700;800&display=swap">
    <style>
      :root {
        --bg0: #0b1220;
        --bg1: #0f1a2e;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.08);
        --stroke: rgba(255, 255, 255, 0.10);
        --stroke2: rgba(255, 255, 255, 0.16);

        --text: #e5e7eb;
        --muted: #9aa4b2;

        --ok: #22c55e;
        --bad: #ef4444;
        --warn: #f59e0b;
        --neutral: #94a3b8;

        --radius: 14px;
        --shadow: 0 18px 34px rgba(0, 0, 0, 0.35);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg0: #f6f7fb;
          --bg1: #eef2ff;
          --card: rgba(15, 23, 42, 0.04);
          --card2: rgba(15, 23, 42, 0.06);
          --stroke: rgba(15, 23, 42, 0.10);
          --stroke2: rgba(15, 23, 42, 0.14);

          --text: #0f172a;
          --muted: #475569;

          --shadow: 0 16px 28px rgba(2, 6, 23, 0.12);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 22px;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 20% 0%, rgba(59, 130, 246, 0.20), transparent 55%),
          radial-gradient(900px 500px at 80% 0%, rgba(34, 197, 94, 0.14), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
      }

      .container {
        width: min(1200px, 100%);
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }

      /* --- Card sizes --- */
      .col-3 { grid-column: span 3; }
      .col-4 { grid-column: span 4; }
      .col-6 { grid-column: span 6; }

      @media (max-width: 1100px) {
        .col-3 { grid-column: span 4; }
      }
      @media (max-width: 820px) {
        .col-3, .col-4 { grid-column: span 6; }
        .col-6 { grid-column: span 12; }
      }
      @media (max-width: 520px) {
        .col-3, .col-4, .col-6 { grid-column: span 12; }
      }

      /* --- Indicator button/card --- */
      .indicator {
        appearance: none;
        border: 1px solid var(--stroke);
        background: linear-gradient(180deg, var(--card), transparent 130%);
        border-radius: var(--radius);
        padding: 14px 14px 12px 14px;
        cursor: pointer;
        text-align: left;
        position: relative;
        overflow: hidden;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        min-height: 124px;
      }

      .indicator::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(300px 120px at 10% 10%, rgba(255, 255, 255, 0.10), transparent 60%);
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }

      .indicator:hover {
        transform: translateY(-3px);
        border-color: var(--stroke2);
        background: linear-gradient(180deg, var(--card2), transparent 140%);
        box-shadow: var(--shadow);
      }
      .indicator:hover::after { opacity: 1; }

      .indicator:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.45);
        outline-offset: 3px;
      }

      /* --- Status bar on the left (ERP-friendly, быстро читается) --- */
      .indicator[data-status="ok"] { --accent: var(--ok); }
      .indicator[data-status="bad"] { --accent: var(--bad); }
      .indicator[data-status="warn"] { --accent: var(--warn); }
      .indicator[data-status="neutral"] { --accent: var(--neutral); }

      .indicator .accent {
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 4px;
        border-radius: 999px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, transparent), transparent 120%);
        opacity: 0.95;
      }

      /* --- Header --- */
      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding-left: 10px;
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }

      .title .name {
        font-size: 13px;
        letter-spacing: 0.02em;
        font-weight: 650;
        color: color-mix(in srgb, var(--text) 85%, var(--muted));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .title .meta {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        font-size: 11px;
        color: color-mix(in srgb, var(--text) 78%, var(--muted));
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.04);
        padding: 4px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }

      /* --- Value row --- */
      .value-row {
        padding-left: 10px;
        margin-top: 10px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .value {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .unit {
        font-size: 12px;
        color: var(--muted);
        margin-left: 6px;
        font-weight: 600;
      }

      /* --- Footer: delta + sparkline --- */
      .foot {
        padding-left: 10px;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .delta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--stroke));
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        color: color-mix(in srgb, var(--accent) 85%, var(--text));
        white-space: nowrap;
      }

      .delta svg { width: 14px; height: 14px; }

      .spark {
        width: 96px;
        height: 26px;
        opacity: 0.95;
      }
      .spark path.line { stroke: var(--accent); stroke-width: 2.2; fill: none; }
      .spark path.fill { fill: color-mix(in srgb, var(--accent) 18%, transparent); }
      .spark path.grid { stroke: rgba(255,255,255,0.10); stroke-width: 1; }
      @media (prefers-color-scheme: light) {
        .spark path.grid { stroke: rgba(15,23,42,0.10); }
      }

      /* Small helper for “no delta” */
      .delta.neutral {
        --accent: var(--neutral);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Revenue -->
      <button class="indicator col-3" data-status="ok" type="button" aria-label="Общая выручка">
        <span class="accent" aria-hidden="true"></span>

        <div class="head">
          <div class="title">
            <div class="name">Общая выручка</div>
            <div class="meta">
              <span>Период: 30 дней</span>
              <span>Обновлено: 2 мин</span>
            </div>
          </div>
          <span class="pill">Факт</span>
        </div>

        <div class="value-row">
          <div>
            <span class="value">₽2.40M</span>
            <span class="unit">RUB</span>
          </div>
        </div>

        <div class="foot">
          <div class="delta" title="Изменение к прошлому периоду">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 14l5-5 5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            +12.5%
          </div>

          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд выручки">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 23 L14 22 L28 18 L42 19 L56 14 L70 12 L84 9 L100 7 L100 30 L0 30 Z" />
            <path class="line" d="M0 23 L14 22 L28 18 L42 19 L56 14 L70 12 L84 9 L100 7" />
          </svg>
        </div>
      </button>

      <!-- Active users -->
      <button class="indicator col-3" data-status="ok" type="button" aria-label="Активные пользователи">
        <span class="accent" aria-hidden="true"></span>

        <div class="head">
          <div class="title">
            <div class="name">Активные пользователи</div>
            <div class="meta">
              <span>Период: сегодня</span>
              <span>Обновлено: 5 мин</span>
            </div>
          </div>
          <span class="pill">Онлайн</span>
        </div>

        <div class="value-row">
          <div>
            <span class="value">8,429</span>
            <span class="unit">MAU</span>
          </div>
        </div>

        <div class="foot">
          <div class="delta">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 14l5-5 5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            +5.2%
          </div>

          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд активных пользователей">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 20 L14 19 L28 21 L42 18 L56 16 L70 15 L84 13 L100 14 L100 30 L0 30 Z" />
            <path class="line" d="M0 20 L14 19 L28 21 L42 18 L56 16 L70 15 L84 13 L100 14" />
          </svg>
        </div>
      </button>

      <!-- Conversion -->
      <button class="indicator col-3" data-status="bad" type="button" aria-label="Конверсия">
        <span class="accent" aria-hidden="true"></span>

        <div class="head">
          <div class="title">
            <div class="name">Конверсия</div>
            <div class="meta">
              <span>Период: 7 дней</span>
              <span>Цель: ≥ 3.8%</span>
            </div>
          </div>
          <span class="pill">KPI</span>
        </div>

        <div class="value-row">
          <div>
            <span class="value">3.24%</span>
          </div>
        </div>

        <div class="foot">
          <div class="delta" title="Изменение к прошлой неделе">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            −0.8%
          </div>

          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд конверсии">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 10 L14 12 L28 13 L42 14 L56 16 L70 18 L84 20 L100 22 L100 30 L0 30 Z" />
            <path class="line" d="M0 10 L14 12 L28 13 L42 14 L56 16 L70 18 L84 20 L100 22" />
          </svg>
        </div>
      </button>

      <!-- Average check -->
      <button class="indicator col-3" data-status="neutral" type="button" aria-label="Средний чек">
        <span class="accent" aria-hidden="true"></span>

        <div class="head">
          <div class="title">
            <div class="name">Средний чек</div>
            <div class="meta">
              <span>Период: 30 дней</span>
              <span>Сегмент: B2B</span>
            </div>
          </div>
          <span class="pill">Срез</span>
        </div>

        <div class="value-row">
          <div>
            <span class="value">₽1,285</span>
            <span class="unit">RUB</span>
          </div>
        </div>

        <div class="foot">
          <div class="delta neutral" title="Без изменений">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 12h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            0.0%
          </div>

          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд среднего чека">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 18 L14 17 L28 18 L42 17 L56 18 L70 17 L84 18 L100 17 L100 30 L0 30 Z" />
            <path class="line" d="M0 18 L14 17 L28 18 L42 17 L56 18 L70 17 L84 18 L100 17" />
          </svg>
        </div>
      </button>

      <!-- SLA -->
      <button class="indicator col-6" data-status="warn" type="button" aria-label="SLA обработки заявок">
        <span class="accent" aria-hidden="true"></span>

        <div class="head">
          <div class="title">
            <div class="name">SLA обработки заявок</div>
            <div class="meta">
              <span>Период: 24 часа</span>
              <span>Цель: ≥ 95%</span>
              <span>Источник: Helpdesk</span>
            </div>
          </div>
          <span class="pill">Операции</span>
        </div>

        <div class="value-row">
          <div>
            <span class="value">93.1%</span>
          </div>
          <span class="pill" style="border-color: color-mix(in srgb, var(--warn) 35%, var(--stroke));">
            Риск
          </span>
        </div>

        <div class="foot">
          <div class="delta" title="Изменение к вчера">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            −1.4%
          </div>

          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд SLA">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 12 L14 11 L28 13 L42 14 L56 15 L70 16 L84 18 L100 19 L100 30 L0 30 Z" />
            <path class="line" d="M0 12 L14 11 L28 13 L42 14 L56 15 L70 16 L84 18 L100 19" />
          </svg>
        </div>
      </button>
    </div>
  </body>
</html>
