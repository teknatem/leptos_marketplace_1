<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Indicators — Ticket/Ring (simple)</title>

    <style>
      /* ============================================================
         Embed-friendly tokens:
         - Авто-тема: prefers-color-scheme
         - Ручная тема: <body data-theme="light|dark">
         - Статус: data-status="ok|bad|warn|neutral|info"
         - Прогресс: style="--p:72" (0..100)
         ============================================================ */

      :root {
        color-scheme: light dark;

        --ok: #22c55e;
        --bad: #ef4444;
        --warn: #f59e0b;
        --info: #3b82f6;
        --neutral: #94a3b8;

        /* light defaults */
        --bg: #f6f7fb;
        --surface: rgba(15, 23, 42, 0.05);
        --surface2: rgba(15, 23, 42, 0.07);
        --stroke: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --muted: #475569;
        --shadow: 0 18px 30px rgba(2, 6, 23, 0.14);

        --r: 18px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --surface: rgba(255, 255, 255, 0.06);
          --surface2: rgba(255, 255, 255, 0.08);
          --stroke: rgba(255, 255, 255, 0.12);
          --text: #e5e7eb;
          --muted: #9aa4b2;
          --shadow: 0 22px 40px rgba(0, 0, 0, 0.35);
        }
      }

      /* manual override */
      body[data-theme="light"] {
        --bg: #f6f7fb;
        --surface: rgba(15, 23, 42, 0.05);
        --surface2: rgba(15, 23, 42, 0.07);
        --stroke: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --muted: #475569;
        --shadow: 0 18px 30px rgba(2, 6, 23, 0.14);
      }
      body[data-theme="dark"] {
        --bg: #0b1220;
        --surface: rgba(255, 255, 255, 0.06);
        --surface2: rgba(255, 255, 255, 0.08);
        --stroke: rgba(255, 255, 255, 0.12);
        --text: #e5e7eb;
        --muted: #9aa4b2;
        --shadow: 0 22px 40px rgba(0, 0, 0, 0.35);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
          Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 22px;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 15% 0%, rgba(59, 130, 246, 0.14), transparent 60%),
          radial-gradient(900px 500px at 85% 0%, rgba(245, 158, 11, 0.10), transparent 60%),
          linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 80%, #0000));
      }

      .grid {
        width: min(1200px, 100%);
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }
      .col-3 { grid-column: span 3; }
      .col-4 { grid-column: span 4; }
      .col-6 { grid-column: span 6; }

      @media (max-width: 1100px) { .col-3 { grid-column: span 4; } }
      @media (max-width: 820px) {
        .col-3, .col-4 { grid-column: span 6; }
        .col-6 { grid-column: span 12; }
      }
      @media (max-width: 520px) { .col-3, .col-4, .col-6 { grid-column: span 12; } }

      /* =========================
         Simple KPI card
         ========================= */
      .kpi {
        --accent: var(--info);
        --p: 68; /* 0..100 */
        --glow: color-mix(in srgb, var(--accent) 22%, transparent);

        appearance: none;
        border: 1px solid transparent;
        border-radius: 16px;
        cursor: pointer;
        text-align: left;
        padding: 14px 14px 12px 14px;
        min-height: 128px;
        position: relative;
        overflow: hidden;

        background:
          linear-gradient(var(--surface), var(--surface)) padding-box,
          linear-gradient(135deg,
            color-mix(in srgb, var(--accent) 70%, transparent),
            color-mix(in srgb, var(--accent) 10%, transparent)
          ) border-box;

        transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      }

      .kpi .fx {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.9;
        background:
          radial-gradient(320px 150px at 18% 18%, var(--glow), transparent 65%),
          radial-gradient(240px 120px at 85% 10%, rgba(255,255,255,0.08), transparent 60%);
      }
      @media (prefers-color-scheme: light) {
        .kpi .fx {
          background:
            radial-gradient(320px 150px at 18% 18%, var(--glow), transparent 65%),
            radial-gradient(240px 120px at 85% 10%, rgba(15,23,42,0.06), transparent 60%);
        }
      }

      .kpi:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
        background:
          linear-gradient(var(--surface2), var(--surface2)) padding-box,
          linear-gradient(135deg,
            color-mix(in srgb, var(--accent) 78%, transparent),
            color-mix(in srgb, var(--accent) 12%, transparent)
          ) border-box;
      }
      .kpi:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--accent) 45%, transparent);
        outline-offset: 3px;
      }

      /* status mapping */
      .kpi[data-status="ok"] { --accent: var(--ok); }
      .kpi[data-status="bad"] { --accent: var(--bad); }
      .kpi[data-status="warn"] { --accent: var(--warn); }
      .kpi[data-status="neutral"] { --accent: var(--neutral); }
      .kpi[data-status="info"] { --accent: var(--info); }

      /* left accent bar (быстро читается, удобно для KPI) */
      .kpi .bar {
        position: absolute;
        left: 10px;
        top: 12px;
        bottom: 12px;
        width: 4px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), transparent 120%);
        opacity: 0.95;
        pointer-events: none;
      }

      .top {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        padding-left: 14px; /* under bar */
      }

      .name {
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.01em;
        color: color-mix(in srgb, var(--text) 86%, var(--muted));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta {
        margin-top: 4px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--muted);
      }

      .chip {
        font-size: 11px;
        font-weight: 800;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--stroke));
        background: color-mix(in srgb, var(--accent) 10%, transparent);
        color: color-mix(in srgb, var(--accent) 88%, var(--text));
        white-space: nowrap;
      }

      .mid {
        position: relative;
        z-index: 1;
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding-left: 14px; /* under bar */
      }

      .value {
        font-size: 30px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .sub {
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .delta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 850;
        color: color-mix(in srgb, var(--accent) 88%, var(--text));
        white-space: nowrap;
      }
      .delta .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
      }

      .hint {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
      }

      /* Progress ring */
      .ring {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        position: relative;
        flex: 0 0 auto;

        background:
          radial-gradient(circle at 50% 50%, var(--bg) 0 52%, transparent 52%),
          conic-gradient(
            var(--accent) calc(var(--p) * 1%),
            color-mix(in srgb, var(--stroke) 80%, transparent) 0
          );

        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 25%, var(--stroke));
      }
      .ring span {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 900;
        color: color-mix(in srgb, var(--text) 70%, var(--muted));
        letter-spacing: 0.02em;
      }

      .foot {
        position: relative;
        z-index: 1;
        margin-top: 12px;
        padding-top: 8px;
        padding-left: 14px;
        font-size: 11px;
        color: var(--muted);
        border-top: 1px solid color-mix(in srgb, var(--accent) 14%, var(--stroke));
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      @media (prefers-reduced-motion: reduce) {
        .kpi { transition: none; }
        .kpi:hover { transform: none; }
      }
    </style>
  </head>

  <!-- Можно убрать data-theme и оставить авто-тему -->
  <body data-theme="dark">
    <div class="grid">
      <button class="kpi col-3" data-status="ok" style="--p:82" type="button" aria-label="Общая выручка">
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>

        <div class="top">
          <div style="min-width: 0">
            <div class="name">Общая выручка</div>
            <div class="meta">
              <span>Период: 30 дней</span>
              <span>Обновлено: 2 мин</span>
            </div>
          </div>
          <span class="chip">Факт</span>
        </div>

        <div class="mid">
          <div>
            <div class="value">₽2.40M</div>
            <div class="sub">
              <div class="delta" title="Изменение к прошлому периоду">
                <span class="dot" aria-hidden="true"></span>
                +12.5%
              </div>
              <div class="hint">к плану: 82%</div>
            </div>
          </div>
          <div class="ring" aria-label="Выполнение к плану"><span>82%</span></div>
        </div>

        <div class="foot">
          <span>Источник: Sales</span>
          <span>Фильтры: Org=1</span>
        </div>
      </button>

      <button class="kpi col-3" data-status="info" style="--p:64" type="button" aria-label="Активные пользователи">
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>

        <div class="top">
          <div style="min-width: 0">
            <div class="name">Активные пользователи</div>
            <div class="meta">
              <span>Период: сегодня</span>
              <span>Обновлено: 5 мин</span>
            </div>
          </div>
          <span class="chip">Онлайн</span>
        </div>

        <div class="mid">
          <div>
            <div class="value">8,429</div>
            <div class="sub">
              <div class="delta">
                <span class="dot" aria-hidden="true"></span>
                +5.2%
              </div>
              <div class="hint">к цели: 64%</div>
            </div>
          </div>
          <div class="ring" aria-label="Достижение цели"><span>64%</span></div>
        </div>

        <div class="foot">
          <span>Источник: Auth</span>
          <span>Срез: Web</span>
        </div>
      </button>

      <button class="kpi col-3" data-status="bad" style="--p:48" type="button" aria-label="Конверсия">
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>

        <div class="top">
          <div style="min-width: 0">
            <div class="name">Конверсия</div>
            <div class="meta">
              <span>Период: 7 дней</span>
              <span>Цель: ≥ 3.8%</span>
            </div>
          </div>
          <span class="chip">KPI</span>
        </div>

        <div class="mid">
          <div>
            <div class="value">3.24%</div>
            <div class="sub">
              <div class="delta">
                <span class="dot" aria-hidden="true"></span>
                −0.8%
              </div>
              <div class="hint">к цели: 48%</div>
            </div>
          </div>
          <div class="ring" aria-label="Достижение цели"><span>48%</span></div>
        </div>

        <div class="foot">
          <span>Источник: Funnel</span>
          <span>Фильтры: Market=All</span>
        </div>
      </button>

      <button class="kpi col-3" data-status="neutral" style="--p:57" type="button" aria-label="Средний чек">
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>

        <div class="top">
          <div style="min-width: 0">
            <div class="name">Средний чек</div>
            <div class="meta">
              <span>Период: 30 дней</span>
              <span>Сегмент: B2B</span>
            </div>
          </div>
          <span class="chip">Срез</span>
        </div>

        <div class="mid">
          <div>
            <div class="value">₽1,285</div>
            <div class="sub">
              <div class="delta">
                <span class="dot" aria-hidden="true"></span>
                0.0%
              </div>
              <div class="hint">к плану: 57%</div>
            </div>
          </div>
          <div class="ring" aria-label="Выполнение к плану"><span>57%</span></div>
        </div>

        <div class="foot">
          <span>Источник: Orders</span>
          <span>Срез: Channel=B2B</span>
        </div>
      </button>

      <button class="kpi col-6" data-status="warn" style="--p:93" type="button" aria-label="SLA обработки заявок">
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>

        <div class="top">
          <div style="min-width: 0">
            <div class="name">SLA обработки заявок</div>
            <div class="meta">
              <span>Период: 24 часа</span>
              <span>Цель: ≥ 95%</span>
              <span>Источник: Helpdesk</span>
            </div>
          </div>
          <span class="chip">Операции</span>
        </div>

        <div class="mid">
          <div>
            <div class="value">93.1%</div>
            <div class="sub">
              <div class="delta">
                <span class="dot" aria-hidden="true"></span>
                −1.4%
              </div>
              <div class="hint">до цели: 1.9 п.п.</div>
            </div>
          </div>
          <div class="ring" aria-label="Текущее значение к цели"><span>93%</span></div>
        </div>

        <div class="foot">
          <span>Фильтры: Queue=All</span>
          <span>Владелец: Support</span>
        </div>
      </button>
    </div>
  </body>
</html>
