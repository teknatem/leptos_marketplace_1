<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI Indicator – Old Magazine</title>
    <style>
      :root {
        /* paper + ink */
        --bg: #0f1115;
        --paper: #f3eddc;
        --paper-2: #efe6cf;
        --ink: #1b1a17;
        --muted: rgba(27, 26, 23, 0.72);
        --muted-2: rgba(27, 26, 23, 0.55);

        /* ui */
        --shadow: rgba(0, 0, 0, 0.35);
        --edge: rgba(27, 26, 23, 0.22);
        --edge-2: rgba(27, 26, 23, 0.12);
        --focus: rgba(70, 128, 255, 0.35);

        /* accents (per design-*) */
        --a1: #c63b2f; /* scarlet */
        --a2: #2b6f6a; /* teal */
        --a3: #1f4bd6; /* cobalt */
        --a4: #8b5a2b; /* sepia */

        --radius: 18px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0f14;
          --paper: #f1ead6;
          --paper-2: #eadfc5;
          --ink: #171613;
          --muted: rgba(23, 22, 19, 0.74);
          --muted-2: rgba(23, 22, 19, 0.56);
          --shadow: rgba(0, 0, 0, 0.45);
          --edge: rgba(23, 22, 19, 0.25);
          --edge-2: rgba(23, 22, 19, 0.14);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(1200px 900px at 20% 10%, rgba(255, 255, 255, 0.06), transparent 55%),
          radial-gradient(900px 800px at 80% 90%, rgba(255, 255, 255, 0.05), transparent 55%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 30%),
          var(--bg);
        color: var(--ink);
        padding: 22px;
        font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      }

      .board {
        width: 280px;
        display: grid;
        gap: 14px;
      }

      /* -------- indicator card -------- */
      .indicator-card {
        width: 280px;
        position: relative;
        border: 1px solid var(--edge);
        border-radius: var(--radius);
        padding: 14px 14px 12px 14px;
        background:
          /* paper fiber */
          linear-gradient(0deg, rgba(0, 0, 0, 0.02), transparent 25%, rgba(0, 0, 0, 0.018)),
          /* warm paper */
          linear-gradient(180deg, var(--paper), var(--paper-2));
        color: var(--ink);
        box-shadow:
          0 16px 26px var(--shadow),
          0 1px 0 rgba(255, 255, 255, 0.25) inset;
        text-align: left;
        cursor: pointer;
        user-select: none;
        outline: none;
        transform: rotate(var(--tilt, 0deg));
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
        overflow: hidden;
      }

      .indicator-card:hover {
        transform: rotate(var(--tilt, 0deg)) translateY(-2px);
        box-shadow:
          0 20px 32px var(--shadow),
          0 1px 0 rgba(255, 255, 255, 0.25) inset;
      }

      .indicator-card:active {
        transform: rotate(var(--tilt, 0deg)) translateY(0px) scale(0.995);
        filter: saturate(1.03);
      }

      .indicator-card:focus-visible {
        box-shadow:
          0 0 0 4px var(--focus),
          0 20px 32px var(--shadow),
          0 1px 0 rgba(255, 255, 255, 0.25) inset;
      }

      /* torn paper edge illusion */
      .indicator-card::before {
        content: "";
        position: absolute;
        inset: -10px;
        background: rgba(0, 0, 0, 0.08);
        transform: translate(6px, 8px);
        filter: blur(10px);
        z-index: 0;
        pointer-events: none;
        border-radius: calc(var(--radius) + 10px);
      }

      .indicator-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;

        /* rough border print + micro tears */
        background:
          /* “ripped” micro notches around edges */
          radial-gradient(10px 7px at 2% 6%, rgba(0, 0, 0, 0.12), transparent 70%),
          radial-gradient(12px 8px at 98% 18%, rgba(0, 0, 0, 0.10), transparent 70%),
          radial-gradient(10px 7px at 6% 92%, rgba(0, 0, 0, 0.10), transparent 70%),
          radial-gradient(12px 8px at 96% 86%, rgba(0, 0, 0, 0.12), transparent 70%),
          /* “ink” border */
          linear-gradient(0deg, transparent, transparent);
        border-radius: var(--radius);

        /* jagged clipping per style */
        clip-path: var(--tear);
        box-shadow:
          0 0 0 1px var(--edge) inset,
          0 0 0 2px rgba(255, 255, 255, 0.10) inset;
      }

      /* print grain + halftone */
      .fx {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0.9;
        background:
          /* tiny speckles */
          radial-gradient(circle at 18% 22%, rgba(0, 0, 0, 0.06) 0 1px, transparent 1.2px),
          radial-gradient(circle at 72% 64%, rgba(0, 0, 0, 0.05) 0 1px, transparent 1.2px),
          radial-gradient(circle at 44% 38%, rgba(0, 0, 0, 0.04) 0 1px, transparent 1.2px),
          radial-gradient(circle at 54% 84%, rgba(0, 0, 0, 0.035) 0 1px, transparent 1.2px),
          /* halftone blocks */
          radial-gradient(circle, rgba(0, 0, 0, 0.05) 0 1px, transparent 1.3px);
        background-size: 42px 42px, 46px 46px, 54px 54px, 60px 60px, 10px 10px;
        mix-blend-mode: multiply;
        filter: contrast(1.05);
      }

      /* side progress bar */
      .bar {
        position: absolute;
        left: 10px;
        top: 12px;
        bottom: 12px;
        width: 10px;
        border-radius: 7px;
        background: rgba(0, 0, 0, 0.08);
        box-shadow:
          0 0 0 1px var(--edge-2) inset,
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
        z-index: 2;
      }
      .bar::before {
        content: "";
        position: absolute;
        left: 1px;
        right: 1px;
        bottom: 1px;
        height: calc(var(--p, 0) * 1%);
        border-radius: 6px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(0, 0, 0, 0.06)),
          linear-gradient(180deg, var(--accent), rgba(0, 0, 0, 0.06));
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.10) inset;
      }

      /* top-right accent "tape" */
      .accent {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 70px;
        height: 14px;
        border-radius: 10px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(0, 0, 0, 0.06)),
          repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.08) 4px, transparent 4px, transparent 8px),
          var(--accent);
        opacity: 0.95;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.22) inset,
          0 0 0 1px rgba(0, 0, 0, 0.10) inset;
        transform: rotate(-4deg);
        z-index: 2;
      }

      /* layout blocks */
      .header,
      .value-row,
      .footer,
      .spark-wrap {
        position: relative;
        z-index: 3;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding-left: 18px; /* for bar */
      }

      .name {
        font-weight: 800;
        letter-spacing: 0.2px;
        font-size: 15px;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .meta {
        margin-top: 6px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--muted);
      }

      .meta span {
        position: relative;
        padding-left: 10px;
      }
      .meta span::before {
        content: "•";
        position: absolute;
        left: 0;
        top: -1px;
        color: rgba(0, 0, 0, 0.38);
      }

      .chip {
        flex: 0 0 auto;
        font-family: ui-monospace, "Courier New", Courier, monospace;
        font-size: 11px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        padding: 6px 8px;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.92);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0.12)),
          var(--accent);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.14) inset,
          0 2px 0 rgba(255, 255, 255, 0.10) inset;
        white-space: nowrap;
      }

      .value-row {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 62px;
        gap: 10px;
        align-items: center;
        padding-left: 18px; /* for bar */
      }

      .value-line {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .value {
        font-weight: 900;
        font-size: 28px;
        line-height: 1;
        letter-spacing: -0.3px;
      }

      .unit {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .sub {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }

      .delta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: ui-monospace, "Courier New", Courier, monospace;
        font-size: 12px;
        padding: 6px 8px;
        border-radius: 12px;
        width: fit-content;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(0, 0, 0, 0.05));
        box-shadow: 0 0 0 1px var(--edge-2) inset;
      }

      .delta .dot {
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.5;
      }

      .delta-arrow svg {
        display: block;
      }

      .delta--good {
        color: #0b6b41;
        box-shadow:
          0 0 0 1px rgba(11, 107, 65, 0.18) inset,
          0 0 0 1px var(--edge-2);
      }

      .delta--bad {
        color: #a11f16;
        box-shadow:
          0 0 0 1px rgba(161, 31, 22, 0.18) inset,
          0 0 0 1px var(--edge-2);
      }

      .delta--neutral {
        color: rgba(27, 26, 23, 0.78);
      }

      .hint {
        font-size: 11px;
        color: var(--muted-2);
        line-height: 1.25;
      }

      /* ring progress */
      .ring {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background:
          conic-gradient(var(--accent) calc(var(--p, 0) * 1%), rgba(0, 0, 0, 0.12) 0),
          linear-gradient(180deg, rgba(255, 255, 255, 0.20), rgba(0, 0, 0, 0.05));
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.14) inset,
          0 6px 10px rgba(0, 0, 0, 0.16);
        position: relative;
      }
      .ring::before {
        content: "";
        position: absolute;
        inset: 7px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(0, 0, 0, 0.06)),
          linear-gradient(180deg, var(--paper), var(--paper-2));
        box-shadow: 0 0 0 1px var(--edge-2) inset;
      }
      .ring > span {
        position: relative;
        z-index: 1;
        font-family: ui-monospace, "Courier New", Courier, monospace;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.2px;
        color: rgba(0, 0, 0, 0.78);
      }

      .footer {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding-left: 18px; /* for bar */
        font-size: 11px;
        color: var(--muted);
        border-top: 1px dashed var(--edge);
        padding-top: 10px;
      }

      .footer span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .spark-wrap {
        margin-top: 10px;
        padding-left: 18px; /* for bar */
      }

      .spark {
        width: 100%;
        height: 34px;
        display: block;
      }
      .spark .grid {
        stroke: rgba(0, 0, 0, 0.15);
        stroke-width: 1;
        fill: none;
        stroke-dasharray: 2 2;
      }
      .spark .fill {
        fill: color-mix(in srgb, var(--accent) 24%, transparent);
        opacity: 0.95;
      }
      .spark .line {
        stroke: color-mix(in srgb, var(--accent) 86%, #000 14%);
        stroke-width: 2.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ---------- status variants ---------- */
      .indicator-card[data-status="ok"] {
        filter: contrast(1.03);
      }
      .indicator-card[data-status="warn"] {
        filter: contrast(1.02) saturate(1.02);
      }
      .indicator-card[data-status="bad"] {
        filter: contrast(1.02) saturate(1.03);
      }

      .indicator-card[data-status="warn"] .chip {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.14)),
          color-mix(in srgb, var(--accent) 70%, #c07a00 30%);
      }
      .indicator-card[data-status="bad"] .chip {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.14)),
          color-mix(in srgb, var(--accent) 65%, #b51a12 35%);
      }

      /* ---------- design variants (tear shape + accent + tilt) ---------- */
      .design-1 {
        --accent: var(--a1);
        --tilt: -0.6deg;
        --tear: polygon(
          2% 6%,
          7% 2%,
          18% 3%,
          34% 1%,
          52% 2%,
          72% 1%,
          93% 4%,
          98% 10%,
          99% 28%,
          98% 52%,
          99% 76%,
          96% 92%,
          88% 98%,
          70% 99%,
          52% 97%,
          34% 99%,
          16% 98%,
          6% 94%,
          1% 84%,
          2% 60%,
          1% 36%,
          2% 18%
        );
      }

      .design-2 {
        --accent: var(--a2);
        --tilt: 0.4deg;
        --tear: polygon(
          3% 4%,
          16% 2%,
          30% 3%,
          48% 1%,
          66% 3%,
          84% 2%,
          97% 6%,
          99% 18%,
          98% 34%,
          99% 52%,
          97% 70%,
          99% 86%,
          92% 98%,
          76% 99%,
          62% 97%,
          46% 99%,
          28% 98%,
          12% 99%,
          2% 92%,
          1% 74%,
          2% 56%,
          1% 34%,
          2% 18%
        );
      }

      .design-3 {
        --accent: var(--a3);
        --tilt: -0.2deg;
        --tear: polygon(
          2% 7%,
          12% 2%,
          22% 4%,
          40% 2%,
          58% 3%,
          76% 1%,
          92% 3%,
          99% 12%,
          98% 26%,
          99% 44%,
          98% 60%,
          99% 78%,
          94% 94%,
          80% 99%,
          62% 97%,
          44% 99%,
          26% 98%,
          10% 99%,
          1% 90%,
          2% 72%,
          1% 54%,
          2% 36%,
          1% 20%
        );
      }

      .design-4 {
        --accent: var(--a4);
        --tilt: 0.7deg;
        --tear: polygon(
          3% 5%,
          10% 2%,
          24% 4%,
          38% 1%,
          54% 2%,
          70% 3%,
          88% 2%,
          98% 8%,
          99% 22%,
          98% 40%,
          99% 58%,
          97% 74%,
          99% 88%,
          90% 98%,
          74% 99%,
          58% 97%,
          42% 99%,
          26% 98%,
          12% 99%,
          2% 94%,
          1% 78%,
          2% 60%,
          1% 40%,
          2% 22%
        );
      }

      /* slightly adjust typography for a “magazine” vibe */
      .indicator-card .name {
        text-shadow: 0.5px 0.6px 0 rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>

  <body>
    <div class="board" aria-label="Список KPI индикаторов">
      <!-- 1 -->
      <button
        class="indicator-card col-1 design-1"
        data-status="ok"
        style="--p:92"
        type="button"
        aria-label="Выручка — неделя 9"
      >
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>
        <span class="accent" aria-hidden="true"></span>

        <div class="header">
          <div class="header__main">
            <div class="name">Выручка</div>
            <div class="meta">
              <span>Неделя 9</span>
              <span>Магазины: 12</span>
            </div>
          </div>
          <span class="chip">KZT</span>
        </div>

        <div class="value-row">
          <div class="value-row__main">
            <div class="value-line">
              <span class="value">18,4</span>
              <span class="unit">млн</span>
            </div>
            <div class="sub">
              <div class="delta delta--good" title="Изменение к прошлому периоду">
                <span class="delta-arrow" aria-hidden="true">
                  <svg width="14" height="14" viewBox="0 0 14 14" role="img" aria-label="Рост">
                    <path d="M7 2l4 5H8.6v5H5.4V7H3l4-5z" fill="currentColor" />
                  </svg>
                </span>
                <span class="dot" aria-hidden="true"></span>
                <span class="delta-text">+6,2%</span>
              </div>
              <div class="hint">Выше плана за счёт роста среднего чека.</div>
            </div>
          </div>
          <div class="ring" aria-label="Выполнение к плану"><span>92%</span></div>
        </div>

        <div class="footer">
          <span>План: 20,0 млн</span>
          <span>Факт: 18,4 млн</span>
        </div>

        <div class="spark-wrap">
          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд Выручка">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 29 L0 22 L10 24 L20 20 L30 21 L40 18 L50 16 L60 18 L70 14 L80 13 L90 11 L100 12 L100 29 Z" />
            <path class="line" d="M0 22 L10 24 L20 20 L30 21 L40 18 L50 16 L60 18 L70 14 L80 13 L90 11 L100 12" />
          </svg>
        </div>
      </button>

      <!-- 2 -->
      <button
        class="indicator-card col-1 design-2"
        data-status="warn"
        style="--p:78"
        type="button"
        aria-label="Маржинальность — март"
      >
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>
        <span class="accent" aria-hidden="true"></span>

        <div class="header">
          <div class="header__main">
            <div class="name">Маржинальность</div>
            <div class="meta">
              <span>Март 2026</span>
              <span>Категория: мебель</span>
            </div>
          </div>
          <span class="chip">GROSS</span>
        </div>

        <div class="value-row">
          <div class="value-row__main">
            <div class="value-line">
              <span class="value">24,1</span>
              <span class="unit">%</span>
            </div>
            <div class="sub">
              <div class="delta delta--bad" title="Изменение к прошлому периоду">
                <span class="delta-arrow" aria-hidden="true">
                  <svg width="14" height="14" viewBox="0 0 14 14" role="img" aria-label="Падение">
                    <path d="M7 12l-4-5h2.4V2h3.2v5H11l-4 5z" fill="currentColor" />
                  </svg>
                </span>
                <span class="dot" aria-hidden="true"></span>
                <span class="delta-text">−1,3 п.п.</span>
              </div>
              <div class="hint">Снижение из-за промо и роста логистических затрат.</div>
            </div>
          </div>
          <div class="ring" aria-label="Выполнение к плану"><span>78%</span></div>
        </div>

        <div class="footer">
          <span>Цель: 26,0%</span>
          <span>Факт: 24,1%</span>
        </div>

        <div class="spark-wrap">
          <svg class="spark" viewBox="0 0 100 30" role="img" aria-label="Тренд Маржинальность">
            <path class="grid" d="M0 29H100" />
            <path class="fill" d="M0 29 L0 10 L10 12 L20 11 L30 13 L40 14 L50 15 L60 16 L70 18 L80 20 L90 19 L100 21 L100 29 Z" />
            <path class="line" d="M0 10 L10 12 L20 11 L30 13 L40 14 L50 15 L60 16 L70 18 L80 20 L90 19 L100 21" />
          </svg>
        </div>
      </button>

      <!-- 3 -->
      <button
        class="indicator-card col-1 design-3"
        data-status="bad"
        style="--p:61"
        type="button"
        aria-label="Срок доставки — SLA"
      >
        <div class="fx" aria-hidden="true"></div>
        <span class="bar" aria-hidden="true"></span>
        <span class="accent" aria-hidden="true"></span>

        <div class="header">
          <div class="header__main">
            <div class="name">Срок доставки</div>
            <div class="meta">
              <span>FBS</span>
              <span>Ozon + WB</span>
            </div>
          </div>
          <span class="chip">SLA</span>
        </div>

        <div class="value-row">
          <div class="value-row__main">
            <div class="value-line">
              <span class="value">2,6</span>
              <span class="unit">дн</span>
            </div>
            <div class="sub">
              <div class="delta delta--bad" title="Изменение к прошлому периоду">
                <span class="delta-arrow" aria-hidden="true">
                  <svg width="14" height="14" viewBox="0 0 14 14" role="img" aria-label="Рост (хуже)">
                    <path d="M7 2l4 5H8.6v5H5.4V7H3l4-5z" fill="currentColor" />
                  </svg>
                </span>
                <span class="dot" aria-hidden="true"></span>
                <span class="delta-text">+0,4 дн</span>
              </div>
              <div class="hint">Просадка из-за перегруза сборки и задержек при отгрузке.</div>
            </div>
          </div>
          <div class="ring" aria-label="Выполнение к плану"><span>61%</span></div>
        </div>

        <div class="footer">
          <span>Норма: ≤ 2,0 дн</span>
          <span>Факт: 2,6 дн</span>
        </div>
