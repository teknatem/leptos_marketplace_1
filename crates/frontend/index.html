    <!-- SheetJS library for Excel parsing (self-hosted mini build, read-only — see static/) -->
    <script src="static/xlsx.mini.min.js"></script>
    <script>
        // CodeMirror is loaded only when a plugin source editor is mounted.
        window.loadPluginCodeEditor = (function() {
            let loading = null;
            return function() {
                if (window.PluginCodeEditor) return Promise.resolve();
                if (loading) return loading;
                loading = new Promise(function(resolve, reject) {
                    const script = document.createElement('script');
                    script.src = 'static/plugin-editor.js';
                    script.onload = resolve;
                    script.onerror = function() {
                        loading = null;
                        reject(new Error('Failed to load plugin editor'));
                    };
                    document.head.appendChild(script);
                });
                return loading;
            };
        })();
    </script>
    <script>
        // Excel parser helper function
        window.parseExcelFile = function(arrayBuffer) {
            try {
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array', raw: false});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // Convert to array of arrays, treating all values as strings
                const data = XLSX.utils.sheet_to_json(worksheet, {
                    header: 1,
                    raw: false,
                    defval: ''
                });
                return data;
            } catch (e) {
                console.error('Excel parsing error:', e);
                throw e;
            }
        };
    </script>

    <!-- Auth fetch interceptor: automatically injects Authorization header for all /api/ requests.
         Handles both fetch(url, init) and fetch(Request) call forms. -->
    <script>
        (function() {
            const _origFetch = window.fetch;
            window.fetch = function(input, init) {
                const token = localStorage.getItem('auth_access_token');
                if (!token) {
                    return _origFetch.call(this, input, init);
                }

                if (input instanceof Request) {
                    // fetch(Request) — use Request(request, init) constructor to preserve body
                    const url = input.url;
                    if (!url.includes('/api/')) {
                        return _origFetch.call(this, input, init);
                    }
                    const headers = new Headers(input.headers);
                    if (!headers.has('Authorization')) {
                        headers.set('Authorization', 'Bearer ' + token);
                    }
                    // Passing a Request as first arg preserves body/mode/cache automatically
                    const newRequest = new Request(input, { headers });
                    return _origFetch.call(this, newRequest);
                } else {
                    // fetch(url, init) — string or URL object
                    const url = (typeof input === 'string') ? input : input.href;
                    if (!url.includes('/api/')) {
                        return _origFetch.call(this, input, init);
                    }
                    init = init ? Object.assign({}, init) : {};
                    const headers = new Headers(init.headers || {});
                    if (!headers.has('Authorization')) {
                        headers.set('Authorization', 'Bearer ' + token);
                    }
                    init.headers = headers;
                    return _origFetch.call(this, input, init);
                }
            };
        })();
    </script>

<body>
    <!-- Load saved theme immediately to prevent flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('app_theme') || 'dark';
            
            // Set data-theme attribute on body
            document.body.setAttribute('data-theme', savedTheme);
            
            // Update theme stylesheet
            const link = document.getElementById('theme-stylesheet');
            if (link) {
                link.disabled = false;
                link.href = 'static/themes/' + savedTheme + '/' + savedTheme + '.css';
            }
        })();
    </script>
