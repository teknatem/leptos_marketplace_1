# Explicitly point to the client crate's Cargo.toml
[build]
manifest_path = "crates/frontend/Cargo.toml"
target = "crates/frontend/index.html"
dist = "dist"
public_url = "/"
watch = ["./crates/frontend"]
# Explicitly point to the workspace's target directory to fix artifact discovery.
target_path = "target"
# wasm-opt обрабатывает WASM после сборки. Уровень 0 убирает debug-секции
# без изменения поведения — это существенно уменьшает бинарь и heap.
# Требует установленного wasm-opt: https://github.com/WebAssembly/binaryen
# Если wasm-opt не установлен — закомментируйте строку ниже.
# wasm_opt = ["-O0", "--strip-debug"]

# Proxy API requests to the backend server during development.
[[proxy]]
backend = "http://localhost:3000/api/"
uri = "/api/"
